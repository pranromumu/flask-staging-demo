name: CD - Deploy with Secrets

on:
  push:
    branches: [ main ]

jobs:
  test-with-secrets:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: pip install flask pytest python-dotenv
    - name: Run tests with secrets
      env:
        API_KEY: ${{ secrets.STAGING_API_KEY }}
        DATABASE_PASSWORD: ${{ secrets.DATABASE_PASSWORD }}
        ENVIRONMENT: staging
      run: |
        echo "Testing with API Key: ${API_KEY:0:10}..."
        echo "Environment: $ENVIRONMENT"
        pytest tests/ -v

  deploy-with-secrets:
    needs: test-with-secrets
    runs-on: ubuntu-latest
    if: success()
    steps:
    - name: Deploy with environment variables
      env:
        API_KEY: ${{ secrets.STAGING_API_KEY }}
        DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
      run: |
        echo "Deploying to staging with API key..."
        echo "Deploy timestamp: $(date)"
        # In real deployment, you'd use these secrets to authenticate